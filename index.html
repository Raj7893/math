<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="indigo"> <div class="container">
    <h1>Mental Math Trainer</h1>
    
    <div id="settings">
        <div class="form-group">
            <label for="theme-select">Interface Theme:</label>
            <select id="theme-select">
                <option value="indigo">Space Indigo (Default)</option>
                <option value="cyber">Cyberpunk Neon</option>
                <option value="forest">Forest Mint</option>
                <option value="sunset">Sunset Gold</option>
                <option value="matrix">Matrix Code</option>
            </select>
        </div>

        <div class="form-group">
            <label for="digits">Number of Digits:</label>
            <select id="digits">
                <option value="1">1 Digit (1-9)</option>
                <option value="2">2 Digits (10-99)</option>
                <option value="3">3 Digits (100-999)</option>
                <option value="4">4 Digits (1000-9999)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="rows">Number of Rows (Max 40):</label>
            <input type="number" id="rows" min="1" max="40" value="5">
        </div>

        <div class="form-group">
            <label>Operations:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" id="op-add" checked> Addition (+)</label>
                <label><input type="checkbox" id="op-sub"> Subtraction (-)</label>
            </div>
        </div>

        <div class="form-group">
            <label for="speed">Speed (seconds per number):</label>
            <input type="number" id="speed" min="0.1" max="5" step="0.1" value="1.5">
        </div>

        <div class="form-group">
            <label><input type="checkbox" id="voice-toggle" checked> Voice (Speak Numbers)</label>
        </div>

        <div id="voice-config-section">
            <div class="form-group">
                <label for="lang-select">Choose Language:</label>
                <select id="lang-select">
                    <option value="all">All System Languages</option>
                </select>
            </div>

            <div class="form-group">
                <label for="type-select">Voice Type:</label>
                <select id="type-select">
                    <option value="all">All Types</option>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                    <option value="human">Premium / Natural (Human)</option>
                    <option value="robotic">Standard (Robotic)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="style-select">Reading Style:</label>
                <select id="style-select">
                    <option value="normal">Normal Number (e.g., 145)</option>
                    <option value="digits">Digit by Digit (e.g., 1, 4, 5)</option>
                </select>
            </div>
        </div>

        <button id="start-btn">Start Flash</button>
    </div>

    <div id="display-area" class="hidden">
        <div id="number-screen"></div>
        <div style="display: flex; gap: 12px; width: 100%;">
            <button id="answer-btn" class="hidden">Show Answer</button>
            <button id="repeat-btn" class="hidden">Repeat Question</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
